<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa de Candidatos CODHAB - Brasília</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="styles.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>

<body>
    <!-- <h1>Candidatos Habilitados por RA e Faixa de Renda</h1> -->
    <div id="buttons2"> EMPREENDIMENTOS
        <button onclick="loadEmpreendimentos()">Obras em andamento</button>
    </div>
    <div id="buttons"> RII_____________
        <button onclick="loadData('RII/RII_FU1.csv')">FAIXA 1 - R$0 até R$2.850,00</button>
        <button onclick="loadData('RII/RII_3SM.csv')">R$0 até R$4.863,00</button>
        <button onclick="loadData('RII/RII_FU2.csv')">FAIXA 2 - R$2.850,01 até R$4.700,00</button>
        <button onclick="loadData('RII/RII_FU3.csv')">FAIXA 3 - R$4.700,01 até R$8.600,00</button>
        <button onclick="loadData('RII/RII_8k_12SM.csv')">R$8.000,00 Mil até R$19.452,00</button>
    </div>
    <div id="buttons"> ENTIDADES______
        <button onclick="loadData('ENTIDADE/IND_ENT_FU1.csv')">FAIXA 1 - R$0 até R$2.850,00</button>
        <button onclick="loadData('ENTIDADE/IND_ENT_3SM.csv')">R$0 até R$4.863,00</button>
        <button onclick="loadData('ENTIDADE/IND_ENT_FU2.csv')">FAIXA 2 - R$2.850,01 até R$4.700,00</button>
        <button onclick="loadData('ENTIDADE/IND_ENT_FU3.csv')">FAIXA 3 - R$4.700,01 até R$8.600,00</button>
        <button onclick="loadData('ENTIDADE/IND_ENT_8k_12SM.csv')">R$8.000,00 Mil até R$19.452,00</button>
    </div>
    <div id="buttons"> RII + ENTIDADES_
        <button onclick="loadData('RII_ENTIDADE/RII+IND-ENT_F1.csv')">FAIXA 1 - R$0 até R$2.850,00</button>
        <button onclick="loadData('RII_ENTIDADE/RII+IND-ENT_3SM.csv')">R$0 até R$4.863,00</button>
        <button onclick="loadData('RII_ENTIDADE/RII+IND-ENT_F2.csv')">FAIXA 2 - R$2.850,01 até R$4.700,00</button>
        <button onclick="loadData('RII_ENTIDADE/RII+IND-ENT_F3.csv')">FAIXA 3 - R$4.700,01 até R$8.600,00</button>
        <button onclick="loadData('RII_ENTIDADE/RII+IND-ENT_8k_12SM.csv')">R$8.000,00 Mil até R$19.452,00</button>
    </div>

    <div id="main">
        <aside id="sidebar">
            <h2>Regiões</h2>
            <ul id="regionList"></ul>
        </aside>
        <div id="map"></div>
        <aside id="sidebarEmpreendimentos">
            <h2>Empreendimentos</h2>
            <ul id="empreendimentosList"></ul>
        </aside>
    </div>

    <script src="script.js"></script>
</body>

</html>
